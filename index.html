<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello BrowserPod</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app-layout">

      <!-- Sidebar -->
      <aside class="workshop-sidebar">
        <div class="sidebar-header">
          <img src="/logo.png" alt="BrowserPod Logo" class="logo" />
          <h2>Workshop</h2>
        </div>
        <ul class="steps-list">
          <li class="step-item" id="step-1">
            <span class="step-number">1</span>
            <span class="step-text">Bootstrap Pod</span>
          </li>
          <li class="step-item" id="step-2">
            <span class="step-number">2</span>
            <span class="step-text">Connect Terminal</span>
          </li>
          <li class="step-item" id="step-3">
            <span class="step-number">3</span>
            <span class="step-text">Hook Portal</span>
          </li>
          <li class="step-item" id="step-4">
            <span class="step-number">4</span>
            <span class="step-text">Sync Filesystem</span>
          </li>
          <li class="step-item" id="step-5">
            <span class="step-number">5</span>
            <span class="step-text">Launch Server</span>
          </li>
        </ul>
        <div class="sidebar-footer">
          <a href="https://browserpod.io/docs" target="_blank" class="docs-btn">View Docs</a>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="content-header">
          <h1>BrowserPod Tetris</h1>
          <div id="url">Waiting for portal...</div>
        </header>

        <div class="dashboard-grid">

          <!-- Preview card: iframe + QR panel -->
          <div class="preview-card">
            <div class="card-header">Preview</div>
            <div class="preview-body">
              <iframe id="portal"></iframe>
              <div id="qr-panel">
                <span class="qr-heading">📱 Play on Mobile</span>
                <div id="qr">
                  <div class="qr-placeholder">
                    <span>QR code will<br>appear here</span>
                  </div>
                </div>
                <p id="qr-label">Waiting for portal...</p>
                <p id="qr-url"></p>
              </div>
            </div>
          </div>

          <!-- Terminal card -->
          <div class="terminal-card">
            <div class="card-header">Terminal</div>
            <pre id="console"></pre>
          </div>

        </div>
      </main>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script type="module">
      window.markStepComplete = (num) => {
        document.getElementById(`step-${num}`).classList.add('completed');
      }
    </script>
  </body>
</html>
